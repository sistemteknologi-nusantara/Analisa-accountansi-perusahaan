<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pengawasan - cah-tegalan.web.id</title>
    <style>
        * {margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI', sans-serif;}
        body {background:#020617; color:#e0f2fe; padding:12px; max-width:820px; margin:0 auto;}
        .menu {background:#0f172a; padding:16px; border-radius:16px; text-align:center; margin-bottom:20px;}
        .menu a {color:#38bdf8; margin:0 10px; text-decoration:none; font-weight:700;}
        .lingkaran {width:110px; height:110px; border-radius:50%; border:6px solid #10b981; color:#10b981; display:flex; align-items:center; justify-content:center; font-size:22px; font-weight:900; box-shadow:0 0 30px #10b981; margin:0 auto 20px;}
        .grid {display:grid; grid-template-columns:1fr 1fr; gap:12px; margin:20px 0;}
        .kotak {background:#0f172a; padding:15px; border-radius:12px; border-left:4px solid #38bdf8;}
        .nilai {font-size:26px; font-weight:900; color:#fbbf24; margin-top:5px;}
        .tombol {padding:14px; border:none; border-radius:10px; font-weight:bold; cursor:pointer; margin:5px; width:100%;}
        .biru {background:#1d4ed8; color:white;}
        .oranye {background:#ea580c; color:white;}
        .ungu {background:#7c3aed; color:white;}
        .hijau {background:#059669; color:white;}
    </style>
</head>
<body>
    <div class="menu">
        <a href="/">🏠 BERANDA</a> |
        <a href="/perangkat">🖥️ PERANGKAT</a> |
        <a href="/pusat">🛩️ PENGAWASAN</a> |
        <a href="/lacak-penyusup">🚨 LACAK PENYERANG</a> |
        <a href="/laporan">📑 LAPORAN</a>
    </div>

    <div class="lingkaran">AMAN</div>
    <div style="text-align:center; font-size:20px; font-weight:bold; margin-bottom:20px;">🎯 STATUS SASARAN: BEBAS</div>

    <div class="grid">
        <div class="kotak">
            <p>RADAR JARAK</p>
            <div class="nilai">50.0 m</div>
        </div>
        <div class="kotak">
            <p>SUHU TERMAL</p>
            <div class="nilai">30.0 °C</div>
        </div>
        <div class="kotak">
            <p>GETARAN</p>
            <div class="nilai">1.0 Level</div>
        </div>
        <div class="kotak">
            <p>SINYAL</p>
            <div class="nilai">95 %</div>
        </div>
        <div class="kotak">
            <p>POSISI</p>
            <div class="nilai">0 Derajat</div>
        </div>
        <div class="kotak">
            <p>DAYA</p>
            <div class="nilai">3.70 Volt</div>
        </div>
    </div>

    <div style="text-align:center; margin:20px 0;">
        <p>🗺️ LOKASI: Arah 0° | Jarak 50.0m | BEBAS</p>
    </div>

    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
        <button class="tombol biru" onclick="kirim('pindai')">📡 PEMINDAIAN</button>
        <button class="tombol oranye" onclick="kirim('kunci')">🎯 KUNCI SASARAN</button>
        <button class="tombol ungu" onclick="kirim('kembali')">🔙 KEMBALI</button>
        <button class="tombol hijau" onclick="kirim('reset')">🔄 ULANG</button>
    </div>

    <script>
        const FIREBASE = "https://mandiriglobalngapak-default-rtdb.asia-southeast1.firebasedatabase.app/pantauan_jauh/perintah_kendali.json";
        function kirim(p) {
            fetch(FIREBASE, {
                method: 'PUT',
                body: JSON.stringify({perintah:p}),
                headers: {'Content-Type':'application/json'}
            });
            alert('✅ Perintah dikirim: ' + p);
        }
    </script>
</body>
</html>
